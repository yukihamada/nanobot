    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f8f9fa;
            --surface2: #e9ecef;
            --border: #dee2e6;
            --text: #212529;
            --muted: #6c757d;
            --brand-accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99,102,241,0.25);
        }
        [data-theme="dark"] {
            --bg: #0d1117;
            --surface: #18181b;
            --surface2: #1e1e24;
            --border: #27272a;
            --text: #e9ecef;
            --muted: #71717a;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .animate-bounce { animation: bounce 1.4s infinite ease-in-out both; }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        #loading { display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; gap: 16px; }
        #loading .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--brand-accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-display { display: none; color: #ef4444; padding: 20px; text-align: center; font-family: monospace; white-space: pre-wrap; max-width: 600px; margin: 0 auto; }
    </style>
    <script>
        window.addEventListener('error', function(e) {
            document.getElementById('loading').style.display = 'none';
            var el = document.getElementById('error-display');
            el.style.display = 'block';
            el.textContent = 'Error: ' + (e.message || e) + '\n' + (e.filename || '') + ':' + (e.lineno || '');
        });
        window.addEventListener('unhandledrejection', function(e) {
            document.getElementById('loading').style.display = 'none';
            var el = document.getElementById('error-display');
            el.style.display = 'block';
            el.textContent = 'Promise Error: ' + (e.reason || e);
        });
    </script>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div style="color: var(--muted); font-size: 14px;">Loading...</div>
    </div>
    <div id="error-display"></div>
    <script>
        // Hide loading once WASM renders
        const observer = new MutationObserver(function() {
            if (document.body.children.length > 3) {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }
        });
        observer.observe(document.body, { childList: true });
    </script>
</body>
